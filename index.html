<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Archives</title>
    <meta name="description" content="Browse The Hindu reading archive by year and month." />
    <style>
        body{font-family:Inter,system-ui,sans-serif;background:#f4f1eb;color:#1a1a1a;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .shell{max-width:720px;width:100%;background:#fffef9;border:1px solid #ece9e2;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:32px}
        h1{font-family:Merriweather,Georgia,serif;font-size:2rem;margin:0 0 8px}
        p{margin:0 0 22px;color:#555;line-height:1.6}
        .links{display:grid;gap:12px}
        a{display:block;padding:16px 18px;border-radius:12px;text-decoration:none;color:#fff;background:linear-gradient(135deg,#0d3325,#1a5c38);font-weight:700}
        a span{display:block;font-size:.85rem;font-weight:500;color:#a8f0c6;margin-top:4px}
    </style>
</head>
<body>
    <main class="shell">
        <h1>News Archives</h1>
        <p>Choose a year to open the dated archive. Each year page links down to the month and daily issue pages.</p>
        <div class="links">
            <a href="2026/index.html">2026 archive <span>Open the year overview</span></a>
        </div>
    </main>

    <script src="assets/js/index.js"></script>
</body>
</html>
